<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تحدي كرة القدم | الاختبار</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="quiz-header">
      <div class="header-content">
        <div>
          <h1 class="header-title">⚽ تحدي كرة القدم</h1>
          <p id="studentName" class="header-subtitle"></p>
        </div>

        <div class="progress-wrap">
          <div class="progress-text">
            <span>تقدمك</span>
            <span id="progressText">0 / 52</span>
          </div>
          <div class="progress-bar"><span id="progressBar"></span></div>
        </div>
      </div>
    </header>

    <main id="quizContainer" class="quiz-layout">
      <aside class="question-nav">
        <h3>الأسئلة</h3>
        <div id="questionNumbers" class="question-numbers"></div>
      </aside>

      <section id="questionCard" class="question-card"></section>
    </main>

    <main id="submittedScreen" class="page-center" style="display: none">
      <section class="login-card">
        <div class="logo">✓</div>
        <h1>تم إرسال إجاباتك</h1>
        <p>
          شكرًا لمشاركتك. سيتم مراجعة الإجابات المقالية، وستظهر لك النتيجة
          بعد اعتمادها من الإدارة.
        </p>
        <button id="checkResultBtn" class="primary-btn">
          التحقق من النتيجة
        </button>
      </section>
    </main>

    <script type="module" src="quiz.js"></script>
  </body>
</html>
